name: Publish container images

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  ORG: empiria

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata for mnemosyne-base
        id: base-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.ORG }}/mnemosyne-base
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short

      - name: Build and push mnemosyne-base
        uses: docker/build-push-action@v6
        with:
          context: containers/base
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.base-meta.outputs.tags }}
          labels: ${{ steps.base-meta.outputs.labels }}
          build-args: |
            MNEMOSYNE_BUILD_HASH=${{ github.sha }}
          cache-from: type=gha,scope=mnemosyne-base
          cache-to: type=gha,mode=max,scope=mnemosyne-base

      - name: Extract metadata for mnemosyne-claude
        id: claude-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.ORG }}/mnemosyne-claude
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short

      - name: Build and push mnemosyne-claude
        uses: docker/build-push-action@v6
        with:
          context: containers/claude
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.claude-meta.outputs.tags }}
          labels: ${{ steps.claude-meta.outputs.labels }}
          build-args: |
            MNEMOSYNE_BUILD_HASH=${{ github.sha }}
            BASE_IMAGE=ghcr.io/${{ env.ORG }}/mnemosyne-base:latest
          cache-from: type=gha,scope=mnemosyne-claude
          cache-to: type=gha,mode=max,scope=mnemosyne-claude
