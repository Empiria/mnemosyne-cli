name: Publish container images

on:
  push:
    branches: [main]
    paths:
      - 'containers/**'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  ORG: empiria

jobs:
  # --- Legacy images (D-10 backward compat) ---

  legacy-base:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata for mnemosyne-base
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.ORG }}/mnemosyne-base
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short

      - name: Build and push mnemosyne-base
        uses: docker/build-push-action@v6
        with:
          context: containers/base
          file: containers/base/Containerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            MNEMOSYNE_BUILD_HASH=${{ github.sha }}
          cache-from: type=gha,scope=mnemosyne-base
          cache-to: type=gha,mode=max,scope=mnemosyne-base

  legacy-claude:
    needs: legacy-base
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata for mnemosyne-claude
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.ORG }}/mnemosyne-claude
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short

      - name: Build and push mnemosyne-claude
        uses: docker/build-push-action@v6
        with:
          context: containers/claude
          file: containers/claude/Containerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            MNEMOSYNE_BUILD_HASH=${{ github.sha }}
            BASE_IMAGE=ghcr.io/${{ env.ORG }}/mnemosyne-base:latest
          cache-from: type=gha,scope=mnemosyne-claude
          cache-to: type=gha,mode=max,scope=mnemosyne-claude

  # --- SCION base images (built from SCION source) ---

  scion-base-images:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout SCION source
        uses: actions/checkout@v4
        with:
          repository: GoogleCloudPlatform/scion
          ref: main

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push SCION base images
        run: |
          image-build/scripts/build-images.sh \
            --registry "${{ env.REGISTRY }}/${{ env.ORG }}" \
            --target all \
            --tag latest \
            --platform linux/amd64 \
            --push

  # --- SCION capability images ---

  empiria-claude:
    needs: scion-base-images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata for empiria-claude
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.ORG }}/empiria-claude
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short

      - name: Build and push empiria-claude
        uses: docker/build-push-action@v6
        with:
          context: containers/empiria-claude
          file: containers/empiria-claude/Containerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BASE_IMAGE=${{ env.REGISTRY }}/${{ env.ORG }}/scion-claude:latest
          cache-from: type=gha,scope=empiria-claude
          cache-to: type=gha,mode=max,scope=empiria-claude

  empiria-claude-anvil:
    needs: empiria-claude
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata for empiria-claude-anvil
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.ORG }}/empiria-claude-anvil
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short

      - name: Build and push empiria-claude-anvil
        uses: docker/build-push-action@v6
        with:
          context: containers/empiria-claude-anvil
          file: containers/empiria-claude-anvil/Containerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BASE_IMAGE=ghcr.io/${{ env.ORG }}/empiria-claude:latest
          cache-from: type=gha,scope=empiria-claude-anvil
          cache-to: type=gha,mode=max,scope=empiria-claude-anvil
